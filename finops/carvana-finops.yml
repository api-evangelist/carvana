specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Carvana
providerId: carvana
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automotive
  - Partner API
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Carvana''s partner integration surface. Two billing shapes coexist:
  partner-negotiated contracts for the Partner / Collective APIs (no public per-call price), and an
  AWS Data Exchange subscription for Carvana Car Sales Data (priced + invoiced through AWS Marketplace).'
notes: Partner API pricing is private. AWS Data Exchange listing surfaces actual invoice lines via the
  AWS Marketplace billing report.
sources:
  - https://api-developer.carvana.com/
  - https://aws.amazon.com/marketplace/pp/prodview-y77x3t6zisn4w
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Carvana, LLC
serviceCategory: Automotive Data + Partner Integration
billingModel:
  pricingCategory: Custom (Partner Contract) + AWS Marketplace Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Carvana Partner / Data APIs
  ServiceCategory: Automotive Data
  ProviderName: Carvana
  PublisherName: Carvana, LLC
  InvoiceIssuerName: Carvana, LLC / Amazon Web Services, Inc.
  BillingCurrency: USD
meters:
  - name: partner_api_requests
    unit: request
    aggregation: sum
    dimensions:
      - subscription_key
      - operation
  - name: inventory_records_managed
    unit: record
    aggregation: count
    dimensions:
      - partner
      - operation
  - name: data_exchange_subscription
    unit: month
    aggregation: sum
    dimensions:
      - product
  - name: data_exchange_data_delivered
    unit: GB
    aggregation: sum
    dimensions:
      - product
      - region
principles:
  - name: Visibility
    description: For Partner API, rely on the per-partner reporting Carvana surfaces during onboarding;
      for AWS Data Exchange, ingest the AWS Marketplace Billing and CUR reports to see Carvana line
      items.
  - name: Allocation
    description: Tag the AWS Marketplace subscription with the consuming product team; allocate Partner
      API contract fees to the inventory operations function that owns the Carvana relationship.
  - name: Optimization
    description: Batch inventory updates rather than polling; subscribe to AWS Data Exchange revisions
      only for the regions / data fields needed to avoid paying for unused breadth.
  - name: Accountability
    description: Assign a single inventory-operations owner for the Carvana Partner contract and a data-platform
      owner for the AWS Data Exchange subscription; review monthly Marketplace invoices.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
