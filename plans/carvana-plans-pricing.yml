specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Carvana
providerId: carvana
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automotive
  - E-Commerce
  - Used Cars
  - Inventory
  - Partner API
description: Carvana exposes two partner-only API surfaces (Carvana Partner API on Azure APIM at api-developer.carvana.com
  and Carvana Collective API at api.collective.carvana.com), plus a Car Sales Data product on AWS Data
  Exchange. The partner APIs are gated behind Carvana LLC authorization and do not publish per-call
  pricing; the AWS Data Exchange listing is the only externally priced surface and uses the AWS Data
  Exchange subscription model (publisher sets price; AWS Marketplace handles billing).
notes: Per-call API pricing for the Partner / Collective APIs is not published — gated to authorized
  partners only. AWS Data Exchange listing prices are visible only via AWS Marketplace once a subscription
  request is initiated.
sources:
  - https://api-developer.carvana.com/
  - https://aws.amazon.com/marketplace/pp/prodview-y77x3t6zisn4w
plans:
  - id: carvana-partner-api
    name: Carvana Partner API (Authorized Partners)
    type: enterprise
    description: REST API for authorized rental, wholesale, and fleet partners to post and manage Carvana
      catalog inventory. Requires Carvana LLC authorization.
    entries:
      - label: Partner integration access
        name: partner_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Inventory post / update / delete
      - name: Azure APIM-issued credentials
      - name: Partner authorization required
  - id: carvana-collective-api
    name: Carvana Collective API
    type: enterprise
    description: Partner-collaborative workflow API. Access restricted to authorized Carvana partners.
    entries:
      - label: Collective partner access
        name: collective_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Collective workflow integration
  - id: carvana-aws-data-exchange
    name: Carvana Car Sales Data (AWS Data Exchange)
    type: subscription
    description: Used-car inventory and sales data product distributed through AWS Data Exchange.
    entries:
      - label: AWS Data Exchange subscription
        name: ade_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see AWS Data Exchange listing
        userMultiplied: false
    elements:
      - name: AWS Marketplace billing
      - name: Direct data warehouse delivery
      - name: Carvana inventory + sales attributes
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
