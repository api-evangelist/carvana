apis:
  - aid: carvana:partner-api
    name: Carvana Partner API
    description: >-
      REST API that enables deep integration between Carvana and authorized
      partners (car rental companies, wholesalers, and fleet operators) for
      posting, updating, and managing used-vehicle inventory. Requires
      Carvana LLC authorization; the developer portal runs on Microsoft
      Azure API Management.
    humanURL: https://api-developer.carvana.com/
    baseURL: https://api-developer.carvana.com
    tags:
      - Partner
      - Inventory
      - Authorized Access
    properties:
      - type: Portal
        url: https://api-developer.carvana.com/
      - type: Login
        url: https://api-developer.carvana.com/signin
      - type: Documentation
        url: https://api-developer.carvana.com/
      - type: TermsOfService
        name: Carvana Property & Unauthorized Access Notice
        url: https://api-developer.carvana.com/
  - aid: carvana:collective-api
    name: Carvana Collective API
    description: >-
      API surface supporting Carvana Collective partner-collaborative
      workflows; access is restricted to authorized Carvana partners.
    humanURL: https://api.collective.carvana.com/
    baseURL: https://api.collective.carvana.com
    tags:
      - Partner
      - Collective
    properties:
      - type: Documentation
        url: https://api.collective.carvana.com/
  - aid: carvana:aws-data-exchange
    name: Carvana Car Sales Data (AWS Data Exchange)
    description: >-
      Carvana's used-car inventory and sales data product published on AWS
      Data Exchange for direct subscription and data-warehouse delivery to
      analytics, pricing, and market-research consumers.
    humanURL: https://aws.amazon.com/marketplace/pp/prodview-y77x3t6zisn4w
    tags:
      - Data Product
      - AWS Data Exchange
      - Inventory
    properties:
      - type: Listing
        url: https://aws.amazon.com/marketplace/pp/prodview-y77x3t6zisn4w
  - aid: carvana:partner-inventory-help
    name: Carvana Partner Inventory Help Center
    description: >-
      Consumer-facing explainer describing how Carvana sources partner
      inventory (rental fleets and other partners) into the buyer catalog.
    humanURL: https://www.carvana.com/help/carvana-inventory/where-is-partner-inventory
    tags:
      - Partner
      - Inventory
      - Consumer
    properties:
      - type: Documentation
        url: https://www.carvana.com/help/carvana-inventory/where-is-partner-inventory
