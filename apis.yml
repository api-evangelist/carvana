aid: carvana
name: Carvana
description: >-
  Carvana is an e-commerce platform for buying, selling, and financing used
  cars online, featuring home delivery or pickup at its distinctive car
  vending machines. Its primary developer-facing integration surface is
  the Carvana Partner REST API (published on Azure API Management at
  api-developer.carvana.com) which enables authorized rental companies,
  wholesalers, and fleet partners to post, update, and manage inventory in
  Carvana's catalog. A Carvana Collective API (api.collective.carvana.com)
  supports partner-collective workflows, and Carvana also distributes
  inventory data via AWS Data Exchange.
type: Index
position: Provider
access: Partner
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Automotive
  - E-Commerce
