specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Carvana
providerId: carvana
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automotive
  - Partner API
  - Rate Limiting
description: The Carvana Partner API runs on Microsoft Azure API Management. Numeric per-second / per-minute
  limits are not publicly documented — they are configured per-subscription in Azure APIM policy and
  delivered to the partner during onboarding. Default Azure APIM behavior surfaces 429 with Retry-After.
notes: Azure APIM-backed; concrete rate limits are partner-specific and not in the public portal. Update
  numeric limits after partner onboarding when the APIM subscription policy is shared.
sources:
  - https://api-developer.carvana.com/
headers:
  retryAfter: Retry-After
  requestId: Ocp-Apim-Trace-Location
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Partner subscription quota / rate
    scope: subscription-key
    metric: varies
    limit: see partner Azure APIM subscription policy
  - name: AWS Data Exchange consumer entitlements
    scope: AWS-account
    metric: varies
    limit: per AWS Data Exchange subscription terms
policies:
  - name: Azure APIM throttling
    description: Carvana's Partner API is fronted by Azure API Management; product- and subscription-level
      rate-limit / quota policies emit 429 on breach with a Retry-After header.
  - name: Subscription-key scoping
    description: Limits apply per Azure APIM subscription key. Partners with multiple environments should
      provision separate keys per environment.
  - name: Exponential backoff
    description: Clients should retry 429 / 503 responses with exponential backoff and jitter, capped
      at the Retry-After value.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
